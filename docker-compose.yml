services:
  # NGINX Reverse Proxy & Web Server
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./dashboard/public:/var/www/html/dashboard:ro
      - ./docker/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - php-fpm
      - owncloud
      - osticket
      - zencart
    networks:
      - frontend_network

  # PHP-FPM for Custom Dashboard
  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile-fpm
    volumes:
      - ./dashboard:/var/www/html/dashboard
    environment:
      DB_HOST: mariadb
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - backend_network
      - frontend_network

  # MariaDB Database Server
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend_network

  # OwnCloud (Private Cloud Storage)
  owncloud:
    image: owncloud/server:latest
    environment:
      - OWNCLOUD_DB_TYPE=mysql
      - OWNCLOUD_DB_NAME=owncloud_db
      - OWNCLOUD_DB_USERNAME=${OWNCLOUD_DB_USER}
      - OWNCLOUD_DB_PASSWORD=${OWNCLOUD_DB_PASSWORD}
      - OWNCLOUD_DB_HOST=mariadb
      - OWNCLOUD_DOMAIN=cloud.firma.lan
    volumes:
      - owncloud_data:/mnt/data
    networks:
      - frontend_network
      - backend_network
    depends_on:
      - mariadb

  # osTicket (Customer Support)
  osticket:
    image: devinsolutions/osticket:1.17.5
    environment:
      - MYSQL_HOST=mariadb
      - MYSQL_USER=${OSTICKET_DB_USER}
      - MYSQL_PASSWORD=${OSTICKET_DB_PASSWORD}
      - MYSQL_DATABASE=osticket_db
      - INSTALL_SECRET=${OSTICKET_INSTALL_SECRET:-secret_placeholder}
    networks:
      - frontend_network
      - backend_network
    depends_on:
      - mariadb

  # Zen Cart (E-Commerce & Inventory)
  zencart:
    build:
      context: .
      dockerfile: docker/php/Dockerfile-apache
    volumes:
      - ./zencart:/var/www/html
    networks:
      - frontend_network
      - backend_network
    depends_on:
      - mariadb

networks:
  frontend_network:
    driver: bridge
  backend_network:
    driver: bridge

volumes:
  mariadb_data:
  owncloud_data:
